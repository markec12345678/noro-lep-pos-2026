services:
  backend:
    build:
      context: ./backend
    ports:
      - "3030:80"
    volumes:
      - ./backend:/var/www/html
      - backend-storage:/var/www/html/storage
    environment:
      - PHP_MEMORY_LIMIT=256M
      - UPLOAD_MAX_FILESIZE=64M
      - POST_MAX_SIZE=64M
    entrypoint: /entrypoint.sh

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:3030
      - VITE_PLACEHOLDER_IMAGE=placeholder.webp
      - VITE_DEMO_SERVER=false
      - VITE_ASSET_URL=http://localhost:3030/storage/uploads
    depends_on:
      - backend

  pos-realtime:
    build:
      context: ./mini-services/pos-realtime
    ports:
      - "3003:3003"
    command: bun index.ts

  furs-service:
    build:
      context: ./mini-services/furs-service
    ports:
      - "3004:3004"
    environment:
      - FURS_MODE=test
      # For production:
      # - FURS_MODE=production
      # - FURS_CERT_PATH=/certs/furs-cert.pem
      # - FURS_KEY_PATH=/certs/furs-key.pem
    command: bun index.ts

  pos-public:
    build:
      context: ./mini-services/pos-public
    ports:
      - "3005:3005"
    environment:
      - COCKPIT_URL=http://backend
      - COCKPIT_API_KEY=public-read-only-key-change-me
      - REALTIME_SERVICE_URL=http://pos-realtime:3003
    depends_on:
      - backend
      - pos-realtime
    command: bun index.ts

volumes:
  backend-storage:
